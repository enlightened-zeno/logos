name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /home/runner/.cargo
  CARGO_INCREMENTAL: 0

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-03-01
          components: rust-src, llvm-tools-preview, clippy, rustfmt
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Unsafe audit
        run: ./scripts/check-unsafe-audit.sh

  build:
    name: Build Kernel
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-03-01
          components: rust-src, llvm-tools-preview
      - name: Build kernel (debug)
        run: cargo build
      - name: Build kernel (release)
        run: cargo build --release

  test-kernel:
    name: "Kernel Tests (SMP=${{ matrix.smp }}, RAM=${{ matrix.memory }})"
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        smp: [1, 2]
        memory: ["128M", "256M"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-03-01
          components: rust-src, llvm-tools-preview
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf mtools
      - name: Build kernel
        run: cargo build
      - name: Fetch Limine bootloader
        run: ./tools/fetch-limine.sh
      - name: Create boot image
        run: ./tools/mkimage-noroot.sh
      - name: Run kernel boot test
        run: |
          OVMF=$(find /usr -name 'OVMF_CODE*.fd' -not -name '*secboot*' 2>/dev/null | head -1)
          echo "Using OVMF: $OVMF"
          timeout 30 qemu-system-x86_64 \
            -bios "$OVMF" \
            -drive file=build/logos.img,format=raw \
            -machine q35 \
            -cpu qemu64,+rdrand,+xsave,+xsaveopt \
            -smp ${{ matrix.smp }} \
            -m ${{ matrix.memory }} \
            -serial file:build/serial.log \
            -display none \
            -no-reboot \
            2>&1 || true
          echo "=== Serial output ==="
          strings build/serial.log | grep -v '^\[' | grep -v '^BdsDxe' || true
          echo "=== Validating ==="
          grep -q "Boot complete. Halting." build/serial.log
          grep -q "All memory tests passed." build/serial.log
          echo "Kernel boot test passed."
