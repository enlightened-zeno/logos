[build]
target = "x86_64-logos.json"

[target.x86_64-logos]
runner = "scripts/run-kernel-tests.sh"
rustflags = ["-C", "force-frame-pointers=yes", "-C", "code-model=kernel"]

[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
json-target-spec = true
